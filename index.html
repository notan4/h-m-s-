<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đề thi trắc nghiệm: Hàm số</title>

  <!-- Cấu hình MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      color: #0f172a;
    }

    header {
      text-align: center;
      padding: 35px 15px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    header p {
      margin: 0;
      font-size: 17px;
    }

    .container {
      max-width: 1050px;
      margin: 30px auto;
      padding: 0 18px 40px;
    }

    .summary {
      background: white;
      border-radius: 16px;
      padding: 18px 22px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .summary strong {
      color: #2563eb;
    }

    .question-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      border-left: 7px solid #2563eb;
    }

    .question-title {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .option-btn {
      border: 2px solid #cbd5e1;
      background: #f8fafc;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      transition: 0.2s;
      min-height: 58px;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #2563eb;
      transform: translateY(-2px);
      background: #eff6ff;
    }

    .option-btn.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #14532d;
      font-weight: bold;
    }

    .option-btn.wrong {
      background: #fee2e2;
      border-color: #dc2626;
      color: #7f1d1d;
      font-weight: bold;
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .explanation {
      display: none;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 12px;
      background: #f1f5f9;
      border-left: 5px solid #7c3aed;
      line-height: 1.7;
    }

    .explanation.show {
      display: block;
    }

    .answer-label {
      font-weight: bold;
      color: #16a34a;
      margin-bottom: 8px;
    }

    .reset-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .reset-btn:hover {
      background: #1d4ed8;
    }

    footer {
      text-align: center;
      color: #475569;
      padding: 20px;
    }

    @media (max-width: 700px) {
      .options {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Đề thi trắc nghiệm: Hàm số</h1>
    <p>Miền xác định, miền giá trị, hàm chẵn - hàm lẻ, kiểm tra đồ thị hàm số</p>
  </header>

  <main class="container">
    <section class="summary">
      <div>
        Số câu đã làm: <strong id="answeredCount">0</strong>/15<br>
        Điểm hiện tại: <strong id="score">0</strong>/15
      </div>
      <button class="reset-btn" id="resetBtn">Làm lại bài</button>
    </section>

    <div id="quiz"></div>
  </main>

  <footer>
    Bấm vào một đáp án để kiểm tra. Đúng hiện màu xanh, sai hiện màu đỏ và hiện giải thích.
  </footer>

  <script>
    const questions = [
      {
        question: "Miền xác định của hàm số \\(f(x)=\\dfrac{1}{x-2}\\) là:",
        options: [
          "\\(\\mathbb{R}\\)",
          "\\(\\mathbb{R}\\setminus\\{2\\}\\)",
          "\\(\\mathbb{R}\\setminus\\{-2\\}\\)",
          "\\((2;+\\infty)\\)"
        ],
        answer: 1,
        explanation: "Mẫu số không được bằng 0. Ta có \\(x-2\\ne0\\Rightarrow x\\ne2\\). Vì vậy miền xác định là \\(\\mathbb{R}\\setminus\\{2\\}\\)."
      },
      {
        question: "Miền xác định của hàm số \\(f(x)=\\sqrt{x+3}\\) là:",
        options: [
          "\\((-3;+\\infty)\\)",
          "\\([-3;+\\infty)\\)",
          "\\((-\\infty;-3]\\)",
          "\\(\\mathbb{R}\\)"
        ],
        answer: 1,
        explanation: "Biểu thức trong căn bậc hai phải không âm: \\(x+3\\ge0\\Rightarrow x\\ge-3\\). Do đó miền xác định là \\([-3;+\\infty)\\)."
      },
      {
        question: "Miền xác định của hàm số \\(f(x)=\\dfrac{\\sqrt{x-1}}{x-4}\\) là:",
        options: [
          "\\([1;+\\infty)\\)",
          "\\((1;+\\infty)\\)",
          "\\([1;+\\infty)\\setminus\\{4\\}\\)",
          "\\(\\mathbb{R}\\setminus\\{4\\}\\)"
        ],
        answer: 2,
        explanation: "Điều kiện căn: \\(x-1\\ge0\\Rightarrow x\\ge1\\). Điều kiện mẫu: \\(x-4\\ne0\\Rightarrow x\\ne4\\). Kết hợp lại được \\([1;+\\infty)\\setminus\\{4\\}\\)."
      },
      {
        question: "Miền giá trị của hàm số \\(f(x)=x^2+1\\), với \\(x\\in\\mathbb{R}\\), là:",
        options: [
          "\\([0;+\\infty)\\)",
          "\\([1;+\\infty)\\)",
          "\\((1;+\\infty)\\)",
          "\\(\\mathbb{R}\\)"
        ],
        answer: 1,
        explanation: "Vì \\(x^2\\ge0\\) với mọi \\(x\\), nên \\(x^2+1\\ge1\\). Giá trị nhỏ nhất là 1 khi \\(x=0\\)."
      },
      {
        question: "Miền giá trị của hàm số \\(f(x)=-x^2+4\\), với \\(x\\in\\mathbb{R}\\), là:",
        options: [
          "\\([4;+\\infty)\\)",
          "\\((-\\infty;4]\\)",
          "\\((-\\infty;4)\\)",
          "\\(\\mathbb{R}\\)"
        ],
        answer: 1,
        explanation: "Vì \\(x^2\\ge0\\), nên \\(-x^2\\le0\\). Do đó \\(-x^2+4\\le4\\). Hàm đạt giá trị lớn nhất là 4 khi \\(x=0\\)."
      },
      {
        question: "Miền giá trị của hàm số \\(f(x)=\\sqrt{x-2}\\) là:",
        options: [
          "\\([2;+\\infty)\\)",
          "\\((2;+\\infty)\\)",
          "\\([0;+\\infty)\\)",
          "\\(\\mathbb{R}\\)"
        ],
        answer: 2,
        explanation: "Căn bậc hai luôn không âm. Khi \\(x=2\\), \\(f(x)=0\\). Khi \\(x\\) tăng, \\(f(x)\\) tăng không giới hạn. Vậy miền giá trị là \\([0;+\\infty)\\)."
      },
      {
        question: "Hàm số \\(f(x)=x^2-3\\) là:",
        options: ["Hàm chẵn", "Hàm lẻ", "Vừa chẵn vừa lẻ", "Không chẵn không lẻ"],
        answer: 0,
        explanation: "Ta có \\(f(-x)=(-x)^2-3=x^2-3=f(x)\\). Vì vậy hàm số là hàm chẵn."
      },
      {
        question: "Hàm số \\(f(x)=x^3+x\\) là:",
        options: ["Hàm chẵn", "Hàm lẻ", "Vừa chẵn vừa lẻ", "Không chẵn không lẻ"],
        answer: 1,
        explanation: "Ta có \\(f(-x)=(-x)^3+(-x)=-x^3-x=-(x^3+x)=-f(x)\\). Do đó hàm số là hàm lẻ."
      },
      {
        question: "Hàm số \\(f(x)=x^2+x\\) là:",
        options: ["Hàm chẵn", "Hàm lẻ", "Vừa chẵn vừa lẻ", "Không chẵn không lẻ"],
        answer: 3,
        explanation: "Ta có \\(f(-x)=x^2-x\\). Biểu thức này không bằng \\(f(x)=x^2+x\\) và cũng không bằng \\(-f(x)=-x^2-x\\). Vậy hàm không chẵn không lẻ."
      },
      {
        question: "Hàm số \\(f(x)=\\dfrac{1}{x^2+1}\\) là:",
        options: ["Hàm chẵn", "Hàm lẻ", "Không chẵn không lẻ", "Chỉ là hàm lẻ khi \\(x>0\\)"],
        answer: 0,
        explanation: "Ta có \\(f(-x)=\\dfrac{1}{(-x)^2+1}=\\dfrac{1}{x^2+1}=f(x)\\). Vậy đây là hàm chẵn."
      },
      {
        question: "Một đường cong là đồ thị của hàm số khi:",
        options: [
          "Mỗi đường thẳng ngang cắt nó tại nhiều nhất một điểm",
          "Mỗi đường thẳng đứng cắt nó tại nhiều nhất một điểm",
          "Nó luôn đối xứng qua trục \\(Oy\\)",
          "Nó luôn đi qua gốc tọa độ"
        ],
        answer: 1,
        explanation: "Để là đồ thị của hàm số \\(y=f(x)\\), với mỗi giá trị \\(x\\) chỉ được có nhiều nhất một giá trị \\(y\\). Vì vậy dùng phép kiểm tra đường thẳng đứng."
      },
      {
        question: "Đường tròn \\(x^2+y^2=4\\) có phải là đồ thị của một hàm số \\(y=f(x)\\) không?",
        options: [
          "Có, vì nó là một đường cong",
          "Có, vì nó đối xứng qua trục \\(Oy\\)",
          "Không, vì có đường thẳng đứng cắt nó tại hai điểm",
          "Không, vì nó không đi qua gốc tọa độ"
        ],
        answer: 2,
        explanation: "Ví dụ tại \\(x=0\\), ta có \\(y=2\\) hoặc \\(y=-2\\). Một giá trị \\(x\\) cho hai giá trị \\(y\\), nên không phải đồ thị của hàm số."
      },
      {
        question: "Tập hợp điểm nào sau đây là đồ thị của một hàm số?",
        options: [
          "\\(\\{(1,2),(1,3),(2,4)\\}\\)",
          "\\(\\{(0,1),(1,1),(2,1)\\}\\)",
          "\\(\\{(2,3),(2,5),(3,6)\\}\\)",
          "\\(\\{(0,0),(0,1),(0,2)\\}\\)"
        ],
        answer: 1,
        explanation: "Một quan hệ là hàm số nếu mỗi giá trị \\(x\\) chỉ ứng với một giá trị \\(y\\). Tập \\(\\{(0,1),(1,1),(2,1)\\}\\) có các giá trị \\(x\\) khác nhau, nên là hàm số."
      },
      {
        question: "Miền xác định của hàm số \\(f(x)=\\dfrac{1}{\\sqrt{x-5}}\\) là:",
        options: [
          "\\([5;+\\infty)\\)",
          "\\((5;+\\infty)\\)",
          "\\((-\\infty;5)\\)",
          "\\(\\mathbb{R}\\setminus\\{5\\}\\)"
        ],
        answer: 1,
        explanation: "Vì căn nằm ở mẫu nên cần \\(x-5>0\\). Suy ra \\(x>5\\). Vậy miền xác định là \\((5;+\\infty)\\)."
      },
      {
        question: "Cho hàm số \\(f(x)=|x|\\). Khẳng định nào đúng?",
        options: [
          "Hàm số là hàm chẵn và có miền giá trị \\([0;+\\infty)\\)",
          "Hàm số là hàm lẻ và có miền giá trị \\(\\mathbb{R}\\)",
          "Hàm số không chẵn không lẻ và có miền giá trị \\([0;+\\infty)\\)",
          "Hàm số là hàm chẵn và có miền giá trị \\((-\\infty;0]\\)"
        ],
        answer: 0,
        explanation: "Ta có \\(f(-x)=|-x|=|x|=f(x)\\), nên hàm chẵn. Ngoài ra \\(|x|\\ge0\\), nên miền giá trị là \\([0;+\\infty)\\)."
      }
    ];

    let answered = 0;
    let score = 0;
    let userAnswered = [];

    function typesetMath(element) {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise(element ? [element] : undefined).catch(function (err) {
          console.log("Lỗi MathJax:", err.message);
        });
      }
    }

    function renderQuiz() {
      const quiz = document.getElementById("quiz");
      quiz.innerHTML = "";
      userAnswered = new Array(questions.length).fill(false);

      questions.forEach(function (q, index) {
        const card = document.createElement("div");
        card.className = "question-card";

        const title = document.createElement("div");
        title.className = "question-title";
        title.innerHTML = "Câu " + (index + 1) + ". " + q.question;
        card.appendChild(title);

        const options = document.createElement("div");
        options.className = "options";

        q.options.forEach(function (option, optionIndex) {
          const button = document.createElement("button");
          button.className = "option-btn";
          button.innerHTML = "<strong>" + String.fromCharCode(65 + optionIndex) + ".</strong> " + option;

          button.addEventListener("click", function () {
            checkAnswer(index, optionIndex, button);
          });

          options.appendChild(button);
        });

        card.appendChild(options);

        const explanation = document.createElement("div");
        explanation.className = "explanation";
        explanation.id = "explanation-" + index;
        explanation.innerHTML =
          "<div class='answer-label'>Đáp án đúng: " + String.fromCharCode(65 + q.answer) + "</div>" +
          "<div>" + q.explanation + "</div>";
        card.appendChild(explanation);

        quiz.appendChild(card);
      });

      typesetMath(quiz);
    }

    function checkAnswer(questionIndex, selectedIndex, selectedButton) {
      if (userAnswered[questionIndex]) return;

      const q = questions[questionIndex];
      const card = selectedButton.closest(".question-card");
      const buttons = card.querySelectorAll(".option-btn");
      const explanation = document.getElementById("explanation-" + questionIndex);

      userAnswered[questionIndex] = true;
      answered++;

      if (selectedIndex === q.answer) {
        selectedButton.classList.add("correct");
        score++;
      } else {
        selectedButton.classList.add("wrong");
        buttons[q.answer].classList.add("correct");
      }

      buttons.forEach(function (btn) {
        btn.disabled = true;
      });

      explanation.classList.add("show");
      document.getElementById("answeredCount").textContent = answered;
      document.getElementById("score").textContent = score;

      typesetMath(explanation);
    }

    function resetQuiz() {
      answered = 0;
      score = 0;
      document.getElementById("answeredCount").textContent = "0";
      document.getElementById("score").textContent = "0";
      renderQuiz();
    }

    window.addEventListener("DOMContentLoaded", function () {
      document.getElementById("resetBtn").addEventListener("click", resetQuiz);
      renderQuiz();
    });
  </script>
</body>
</html>
